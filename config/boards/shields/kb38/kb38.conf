# ── Pointing device (Cirque Pinnacle) ─────────────────────────────────────────
CONFIG_ZMK_POINTING=y
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_PINNACLE=y

# ── Battery ───────────────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=n

# ── Debounce ─────────────────────────────────────────────────────────────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=15
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15

# ── BLE / power ───────────────────────────────────────────────────────────────
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Cirque init priority ────────────────────────────────────────────────────
# Cirque needs ~300ms power-on reset. Priority 99 delays driver init to the
# end of the boot sequence, avoiding "Failed to write reset to SYS_CONFIG1"
# errors on startup.
CONFIG_INPUT_INIT_PRIORITY=99
