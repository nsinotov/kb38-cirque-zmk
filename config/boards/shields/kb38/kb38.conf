# ── Pointing device (Cirque) ──────────────────────────────────────────────────
CONFIG_ZMK_POINTING=y
CONFIG_CIRQUE_PINNACLE=y
# Relative mode: acts like a mouse (recommended for Cirque trackpad)
CONFIG_CIRQUE_PINNACLE_POSITION_MODE_RELATIVE=y

# ── Battery ───────────────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y
# NOTE: SuperMini NRF52840 has unpopulated voltage divider on P0.24.
# If battery % always shows 0 or incorrect, disable the line below:
# CONFIG_ZMK_BATTERY_REPORTING=n

# ── BLE / power ───────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE_STATUS_LED=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Logging (disable for production) ─────────────────────────────────────────
# CONFIG_ZMK_USB_LOGGING=y
